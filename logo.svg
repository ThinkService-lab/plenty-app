<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 56" width="230" height="56" role="img" aria-label="PlentyMeals logo">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');</style>
  </defs>

  <!-- Terracotta circle -->
  <circle cx="28" cy="28" r="24" fill="#C4622D"/>

  <!-- Leaf — elongated, pointed tip at top, green -->
  <path d="M28 10 C36 12 41 19 40 28 C39 36 34 43 28 44 C22 43 17 36 16 28 C15 19 20 12 28 10Z"
        fill="#5AAF85"/>

  <!-- Centre vein -->
  <line x1="28" y1="10" x2="28" y2="44"
        stroke="#2D7A5A" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>

  <!-- Wordmark -->
  <text x="64" y="37"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="700"
        fill="#3D2B1F"
        letter-spacing="-0.4">PlentyMeals</text>
</svg>
