<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 56" width="230" height="56" role="img" aria-label="PlentyMeals logo">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');</style>
  </defs>

  <!-- Terracotta circle -->
  <circle cx="28" cy="28" r="24" fill="#C4622D"/>

  <!-- Leaf shape (white, slightly transparent) -->
  <path d="M28 41 C17 33 13 22 15 14 C17 7 23 6 28 10 C33 6 39 7 41 14 C43 22 39 33 28 41Z"
        fill="rgba(255,255,255,0.92)"/>

  <!-- Leaf centre vein -->
  <line x1="28" y1="41" x2="28" y2="12"
        stroke="#C4622D" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="64" y="37"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="700"
        fill="#3D2B1F"
        letter-spacing="-0.4">PlentyMeals</text>
</svg>
